services:
  - type: web
    name: scholarship-forge
    env: node
    plan: free
    buildCommand: ""
    startCommand: "node server.js"
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: DASHSCOPE_MODEL
        value: qwen-plus
      - key: DASHSCOPE_BASE_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_TABLE
        value: student_generations
